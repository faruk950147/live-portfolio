{% extends "base.html" %}
{% block title %}Verify Email{% endblock title %}
{% load static %}

{% block main %}
  <main class="main">
    <!-- Contact Section -->
    <section id="contact" class="contact section">

      <div class="container" data-aos="fade-up" data-aos-delay="100">
        <form method="post" class="php-email-form" data-aos="fade-up" data-aos-delay="600" novalidate>
          {% csrf_token %}
          <h1 class="section-title text-center">Verify Email</h1>
          <div class="row gy-4">
            <div class="col-md-6 ">
              {{form.email}}
              {{form.errors.email}}
            </div>
            
            <div class="col-md-6">
              {{form.otp}}
              {{form.errors.otp}}
            </div>


            <div class="col-md-12 text-center">
              <div class="sent-message"></div>
              <div class="error-message"></div>
              <button type="submit">Verify Now</button>
            </div>

          </div>
        </form><!-- End Contact Form -->

      </div>

    </section><!-- /Contact Section -->

  </main>
{% endblock main %}
